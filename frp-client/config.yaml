name: "FRP Client"
description: "You can use this tool to achieve remote access to local Home Assistant OS by port forwarding"
version: "1.0.0"
slug: "frp_client"
host_network: true
startup: application
boot: "auto"
init: false
map:
  - "share:rw"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  serverAddr: "example.com"
  serverPort: 7000
  authToken: "123456789"
  proxyName: "homeassistant"
  localPort: 8123
  remotePort: 8123
schema:
  serverAddr: str
  serverPort: int
  authToken: str
  proxyName: str
  localPort: int
  remotePort: int
